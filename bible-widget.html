<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verse of the Day</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    font-family: 'EB Garamond', serif;
    padding: 4px;
  }

  .card {
    position: relative;
    border-radius: 10px;
    overflow: hidden;
    padding: 22px 24px 18px;
    background: linear-gradient(160deg, #f5f0e8 0%, #efe8d8 100%);
    box-shadow: 0 6px 24px rgba(0,0,0,.12);
    color: #3a2e1e;
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .card:hover { transform: translateY(-2px); }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #7b5e3a, #c4956a, #7b5e3a);
  }

  .tag {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: #7b5e3a;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tag::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, #7b5e3a50, transparent);
  }

  .cross {
    float: right;
    font-size: 28px;
    color: #7b5e3a20;
    line-height: 1;
    margin-left: 8px;
    user-select: none;
  }

  .verse-text {
    font-size: 15px;
    line-height: 1.7;
    color: #2a2010;
    min-height: 56px;
    transition: opacity .4s ease;
  }

  .verse-ref {
    margin-top: 10px;
    font-family: 'Cinzel', serif;
    font-size: 10.5px;
    letter-spacing: .14em;
    color: #7b5e3a;
    text-align: right;
    transition: opacity .4s ease;
  }

  .controls {
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .dots { display: flex; gap: 5px; }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #7b5e3a25;
    transition: background .3s;
    cursor: pointer;
  }
  .dot.active { background: #7b5e3a; }

  .btn {
    background: none;
    border: 1px solid #7b5e3a50;
    border-radius: 4px;
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 5px 12px;
    color: #7b5e3a;
    cursor: pointer;
    transition: background .2s;
  }
  .btn:hover { background: #7b5e3a12; }

  .fading { opacity: 0 !important; }
</style>
</head>
<body>
<div class="card">
  <div class="tag">✝ Verse of the Day · MSG</div>
  <div>
    <span class="cross">✞</span>
    <div class="verse-text" id="verse-text"></div>
  </div>
  <div class="verse-ref" id="verse-ref"></div>
  <div class="controls">
    <div class="dots" id="dots"></div>
    <button class="btn" id="next-btn">Next →</button>
  </div>
</div>

<script>
const verses = [
  { text: "Whatever I have, wherever I am, I can make it through anything in the One who makes me who I am.", ref: "Philippians 4:13 MSG" },
  { text: "This is how much God loved the world: He gave his Son, his one and only Son. And this is why: so that no one need be destroyed; by believing in him, anyone can have a whole and lasting life.", ref: "John 3:16 MSG" },
  { text: "God, my shepherd! I don't need a thing. You have bedded me down in lush meadows, you find me quiet pools to drink from.", ref: "Psalm 23:1–2 MSG" },
  { text: "Trust God from the bottom of your heart; don't try to figure out everything on your own. Listen for God's voice in everything you do, everywhere you go; he's the one who will keep you on track.", ref: "Proverbs 3:5–6 MSG" },
  { text: "Don't be timid; don't get discouraged. God, your God, is with you every step you take.", ref: "Joshua 1:9 MSG" },
  { text: "That's why we can be so sure that every detail in our lives of love for God is worked into something good.", ref: "Romans 8:28 MSG" },
  { text: "Are you tired? Worn out? Burned out on religion? Come to me. Get away with me and you'll recover your life.", ref: "Matthew 11:28 MSG" },
  { text: "God bless you and keep you, God smile on you and gift you, God look you full in the face and make you prosper.", ref: "Numbers 6:24–26 MSG" },
  { text: "I know what I'm doing. I have it all planned out — plans to take care of you, not abandon you, plans to give you the future you hope for.", ref: "Jeremiah 29:11 MSG" },
  { text: "Step out of the traffic! Take a long, loving look at me, your High God, above politics, above everything.", ref: "Psalm 46:10 MSG" },
  { text: "Don't fret or worry. Instead of worrying, pray. Let petitions and praises shape your worries into prayers, letting God know your concerns.", ref: "Philippians 4:6 MSG" },
  { text: "By your words I can see where I'm going; they throw a beam of light on my dark path.", ref: "Psalm 119:105 MSG" },
];

const textEl  = document.getElementById('verse-text');
const refEl   = document.getElementById('verse-ref');
const dotsEl  = document.getElementById('dots');
const nextBtn = document.getElementById('next-btn');

const today = new Date();
const dayIndex = (today.getFullYear() * 366 + today.getMonth() * 31 + today.getDate()) % verses.length;
let current = parseInt(sessionStorage.getItem('bibleIdx') ?? dayIndex);
if (isNaN(current)) current = dayIndex;

const shown = Math.min(verses.length, 10);
for (let i = 0; i < shown; i++) {
  const d = document.createElement('div');
  d.className = 'dot';
  d.addEventListener('click', () => show(i));
  dotsEl.appendChild(d);
}

function show(idx) {
  textEl.classList.add('fading');
  refEl.classList.add('fading');
  setTimeout(() => {
    current = ((idx % verses.length) + verses.length) % verses.length;
    sessionStorage.setItem('bibleIdx', current);
    textEl.textContent = verses[current].text;
    refEl.textContent = verses[current].ref;
    [...dotsEl.children].forEach((d, i) => d.classList.toggle('active', i === current % shown));
    textEl.classList.remove('fading');
    refEl.classList.remove('fading');
  }, 300);
}

nextBtn.addEventListener('click', () => show(current + 1));
show(current);
</script>
</body>
</html>
