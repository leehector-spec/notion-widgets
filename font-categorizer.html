<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Magnolia Font Categorizer</title>
<style>
  :root {
    --bg:#0f0f13;--surface:#1a1a22;--surface2:#22222e;--border:#2e2e3e;
    --accent:#e85d75;--accent2:#7c5cbf;--accent3:#4ab8a0;
    --text:#e8e6f0;--muted:#888099;--success:#4ab87a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Georgia',serif;min-height:100vh;}
  header{background:linear-gradient(135deg,#1a0a1e 0%,#0f1a2e 100%);border-bottom:1px solid var(--border);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;}
  .logo{display:flex;align-items:center;gap:14px;}
  .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
  .logo h1{font-size:18px;font-weight:700;}
  .logo p{font-size:11px;color:var(--muted);font-family:sans-serif;margin-top:2px;}
  .header-stats{display:flex;gap:16px;}
  .hstat{text-align:center;font-family:sans-serif;}
  .hstat-n{font-size:22px;font-weight:700;color:var(--accent);}
  .hstat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

  .controls{padding:16px 28px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:12px;align-items:center;}
  .btn{padding:9px 20px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:sans-serif;transition:all .2s;display:flex;align-items:center;gap:7px;}
  .btn-export{background:var(--accent3);color:#0f1a18;}
  .btn-export:hover{background:#3aa890;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn-secondary:hover{background:var(--border);}

  .filters{padding:14px 28px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;border-bottom:1px solid var(--border);background:var(--bg);}
  .filters label{font-family:sans-serif;font-size:12px;color:var(--muted);margin-right:4px;}
  .filter-btn{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-family:sans-serif;cursor:pointer;transition:all .15s;}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:white;}
  .filter-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}
  .search-box{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-family:sans-serif;width:220px;outline:none;}
  .search-box:focus{border-color:var(--accent2);}

  .stats-bar{padding:10px 28px;display:flex;gap:20px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--surface);}
  .stat{display:flex;align-items:center;gap:7px;}
  .stat-dot{width:10px;height:10px;border-radius:2px;}
  .stat-label{font-family:sans-serif;font-size:12px;color:var(--muted);}
  .stat-count{font-family:sans-serif;font-size:12px;font-weight:700;color:var(--text);}

  .results{padding:20px 28px;padding-bottom:60px;}
  .category-section{margin-bottom:28px;}
  .cat-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .cat-color{width:13px;height:13px;border-radius:3px;flex-shrink:0;}
  .cat-name{font-size:15px;font-weight:700;}
  .cat-count{font-family:sans-serif;font-size:12px;background:var(--surface2);padding:2px 10px;border-radius:10px;color:var(--muted);}
  .cat-dtf{font-family:sans-serif;font-size:11px;color:var(--muted);margin-left:auto;}
  .font-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .font-tag{padding:4px 11px;border-radius:5px;font-family:sans-serif;font-size:11px;border:1px solid;cursor:default;transition:transform .1s;}
  .font-tag:hover{transform:translateY(-1px);}

  .csv-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;}
  .csv-modal.open{display:flex;}
  .csv-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;max-width:580px;width:92%;max-height:80vh;display:flex;flex-direction:column;gap:12px;}
  .csv-box h2{font-size:15px;}
  .csv-box textarea{flex:1;min-height:280px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-family:monospace;font-size:11px;resize:vertical;outline:none;}
  .csv-actions{display:flex;gap:10px;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🌸</div>
    <div>
      <h1>Sweet Magnolia Font Categorizer</h1>
      <p>DTF & Apparel Design Library — Pre-categorized</p>
    </div>
  </div>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-n" id="totalFonts">2,998</div><div class="hstat-l">Total Fonts</div></div>
    <div class="hstat"><div class="hstat-n" id="totalCats">11</div><div class="hstat-l">Categories</div></div>
    <div class="hstat"><div class="hstat-n" id="showingCount">2,998</div><div class="hstat-l">Showing</div></div>
  </div>
</header>

<div class="controls">
  <button class="btn btn-export" onclick="openExport()">⬇ Export CSV</button>
  <button class="btn btn-secondary" onclick="copyNotion()">📋 Copy for Notion</button>
  <span style="font-family:sans-serif;font-size:12px;color:var(--muted)">✅ All 2,998 fonts pre-categorized — ready to use</span>
</div>

<div class="filters">
  <label>Filter:</label>
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('Script / Handwriting',this)">Script</button>
  <button class="filter-btn" onclick="setFilter('Display / Decorative',this)">Display</button>
  <button class="filter-btn" onclick="setFilter('Sans-Serif',this)">Sans-Serif</button>
  <button class="filter-btn" onclick="setFilter('Serif',this)">Serif</button>
  <button class="filter-btn" onclick="setFilter('Slab Serif',this)">Slab</button>
  <button class="filter-btn" onclick="setFilter('Monospace',this)">Mono</button>
  <button class="filter-btn" onclick="setFilter('Blackletter / Gothic',this)">Blackletter</button>
  <button class="filter-btn" onclick="setFilter('Novelty / Fun',this)">Novelty</button>
  <button class="filter-btn" onclick="setFilter('System / UI',this)">System</button>
  <button class="filter-btn" onclick="setFilter('Symbol / Dingbat',this)">Symbol</button>
  <button class="filter-btn" onclick="setFilter('Non-Latin / International',this)">Non-Latin</button>
  <input class="search-box" id="searchBox" type="text" placeholder="🔍 Search fonts..." oninput="renderResults()">
</div>

<div class="stats-bar" id="statsBar"></div>
<div class="results" id="resultsArea"></div>

<div class="csv-modal" id="csvModal">
  <div class="csv-box">
    <h2>⬇ Export — SweetMagnolia_FontLibrary.csv</h2>
    <textarea id="csvContent" readonly></textarea>
    <div class="csv-actions">
      <button class="btn btn-export" onclick="downloadCSV()">⬇ Download .csv</button>
      <button class="btn btn-secondary" onclick="copyCSV()">📋 Copy</button>
      <button class="btn btn-secondary" onclick="closeExport()">✕ Close</button>
    </div>
  </div>
</div>

  "Non-Latin / International":{bg:"#1a2a2a",border:"#009688",text:"#80cbc4"},
};

const DTF_NOTES = {
  "Script / Handwriting":"⚠️ Check stroke width — thin scripts may not transfer well",
  "Display / Decorative":"✅ Great for DTF — bold, eye-catching prints",
  "Sans-Serif":"✅ Excellent — clean, sharp transfer",
  "Serif":"✅ Good — watch very thin serifs",
  "Slab Serif":"✅ Excellent — bold and durable",
  "Blackletter / Gothic":"✅ Popular apparel style — transfers well",
  "Novelty / Fun":"✅ Fun prints — check detail level",
  "Monospace":"✅ Clean technical look",
  "System / UI":"ℹ️ Standard system fonts",
  "Symbol / Dingbat":"ℹ️ Icons/symbols — verify resolution",
  "Non-Latin / International":"ℹ️ Specialty language fonts",
};

let activeFilter = 'all';

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderResults();
}

function renderResults() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const catMap = {};
  let showing = 0;
  for (const [font, cat] of Object.entries(CATEGORIZED)) {
    if (search && !font.toLowerCase().includes(search)) continue;
    if (activeFilter !== 'all' && cat !== activeFilter) continue;
    if (!catMap[cat]) catMap[cat] = [];
    catMap[cat].push(font);
    showing++;
  }
  document.getElementById('showingCount').textContent = showing.toLocaleString();

  const order = ["Script / Handwriting","Display / Decorative","Novelty / Fun","Sans-Serif","Serif","Slab Serif","Blackletter / Gothic","Monospace","Symbol / Dingbat","System / UI","Non-Latin / International"];
  const sorted = order.filter(c => catMap[c]).concat(Object.keys(catMap).filter(c => !order.includes(c)));

  // Stats bar
  document.getElementById('statsBar').innerHTML = sorted.map(cat => {
    const col = CATEGORY_COLORS[cat] || {border:'#888',text:'#aaa'};
    return `<div class="stat"><div class="stat-dot" style="background:${col.border}"></div><span class="stat-label">${cat}</span><span class="stat-count">${catMap[cat].length}</span></div>`;
  }).join('');

  if (sorted.length === 0) {
    document.getElementById('resultsArea').innerHTML = `<div style="text-align:center;padding:60px;color:var(--muted);font-family:sans-serif"><div style="font-size:40px;margin-bottom:12px">🔍</div><h2>No results</h2></div>`;
    return;
  }

  document.getElementById('resultsArea').innerHTML = sorted.map(cat => {
    const col = CATEGORY_COLORS[cat] || {bg:'#1a1a22',border:'#555',text:'#aaa'};
    const fonts = catMap[cat].sort((a,b) => a.localeCompare(b));
    return `<div class="category-section">
      <div class="cat-header">
        <div class="cat-color" style="background:${col.border}"></div>
        <span class="cat-name">${cat}</span>
        <span class="cat-count">${fonts.length}</span>
        <span class="cat-dtf">${DTF_NOTES[cat]||''}</span>
      </div>
      <div class="font-grid">
        ${fonts.map(f=>`<span class="font-tag" style="background:${col.bg};border-color:${col.border};color:${col.text}">${f}</span>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function openExport() {
  const rows = ['Font Name,Category,DTF Notes'];
  for (const [font, cat] of Object.entries(CATEGORIZED)) {
    const note = (DTF_NOTES[cat]||'').replace(/[✅⚠️ℹ️]/g,'').trim();
    rows.push(`"${font.replace(/"/g,'""')}","${cat}","${note}"`);
  }
  document.getElementById('csvContent').value = rows.join('\n');
  document.getElementById('csvModal').classList.add('open');
}

function closeExport(){ document.getElementById('csvModal').classList.remove('open'); }

function downloadCSV(){
  const csv = document.getElementById('csvContent').value;
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'SweetMagnolia_FontLibrary.csv'; a.click();
}

function copyCSV(){
  navigator.clipboard.writeText(document.getElementById('csvContent').value);
  event.target.textContent='✓ Copied!';
  setTimeout(()=>event.target.textContent='📋 Copy',2000);
}

function copyNotion(){
  const lines = [];
  for(const [font,cat] of Object.entries(CATEGORIZED)){
    lines.push(`${font}\t${cat}`);
  }
  navigator.clipboard.writeText(lines.join('\n'));
  event.target.textContent='✓ Copied!';
  setTimeout(()=>event.target.textContent='📋 Copy for Notion',2000);
}

renderResults();
