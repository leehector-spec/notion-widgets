<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 FIFA World Cup</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  background: transparent;
  font-family: 'Barlow Condensed', sans-serif;
  display: flex;
  justify-content: center;
  padding: 10px;
}

.widget {
  width: 100%;
  max-width: 520px;
  background: #0a0e1a;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  border: 1px solid rgba(212,175,55,0.2);
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #0d1b2a 0%, #1a2744 50%, #0d1b2a 100%);
  padding: 18px 20px 14px;
  border-bottom: 2px solid #d4af37;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 20px,
    rgba(212,175,55,0.03) 20px,
    rgba(212,175,55,0.03) 21px
  );
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
}
.trophy {
  font-size: 28px;
  filter: drop-shadow(0 0 8px rgba(212,175,55,0.5));
}
.title-block { text-align: center; flex: 1; }
.title-main {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  color: #d4af37;
  letter-spacing: 3px;
  line-height: 1;
  text-shadow: 0 0 20px rgba(212,175,55,0.3);
}
.title-sub {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  color: #7a9bc4;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-top: 2px;
}
.host-flags { font-size: 18px; letter-spacing: 4px; }

/* ── Group tabs ── */
.group-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 12px 16px 8px;
  background: #0d1220;
  border-bottom: 1px solid rgba(212,175,55,0.15);
}
.tab {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 1px;
  color: #4a6080;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 3px;
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.tab:hover { color: #d4af37; border-color: rgba(212,175,55,0.3); }
.tab.active {
  color: #0a0e1a;
  background: #d4af37;
  border-color: #d4af37;
}

/* ── Content area ── */
.content { padding: 16px; }

.group-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  color: #d4af37;
  letter-spacing: 3px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.group-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(212,175,55,0.4), transparent);
}

/* ── Standings table ── */
.standings {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 16px;
  font-size: 13px;
}
.standings th {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #4a6080;
  padding: 6px 6px 6px 0;
  text-align: center;
  border-bottom: 1px solid rgba(212,175,55,0.15);
}
.standings th:first-child { text-align: left; padding-left: 4px; }
.standings td {
  padding: 0;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.standings td:first-child { text-align: left; }

.team-row {
  transition: background 0.15s;
}
.team-row:hover { background: rgba(255,255,255,0.04); }
.team-row.qualified { background: rgba(212,175,55,0.06); }

.team-cell {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 4px;
}
.team-img {
  width: 28px;
  height: 20px;
  object-fit: cover;
  border-radius: 2px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #1a2744;
  flex-shrink: 0;
}
.team-flag-placeholder {
  width: 28px;
  height: 20px;
  border-radius: 2px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #1a2744;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}
.team-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: #c8d8e8;
  white-space: nowrap;
}
.team-name.host { color: #d4af37; }

.stat-cell {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  color: #6a8aaa;
  padding: 7px 4px;
  min-width: 28px;
}
.pts-cell {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  color: #d4af37;
  padding: 7px 6px;
}
.qualify-marker {
  width: 3px;
  height: 100%;
  background: #d4af37;
}

/* ── Matches ── */
.matches-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  color: #7a9bc4;
  letter-spacing: 2px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.matches-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(122,155,196,0.2);
}

.match-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 4px;
  padding: 10px 12px;
  margin-bottom: 6px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 8px;
  transition: border-color 0.2s;
}
.match-card:hover { border-color: rgba(212,175,55,0.2); }
.match-card.played { border-left: 2px solid #d4af37; }
.match-card.upcoming { border-left: 2px solid #2a4060; }

.match-team {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: #c8d8e8;
  display: flex;
  align-items: center;
  gap: 6px;
}
.match-team.away { justify-content: flex-end; text-align: right; }
.match-team-flag { font-size: 16px; }

.match-center { text-align: center; }
.match-score {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: #d4af37;
  letter-spacing: 2px;
  line-height: 1;
}
.match-vs {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  color: #2a4060;
  letter-spacing: 2px;
}
.match-date {
  font-family: 'Barlow', sans-serif;
  font-size: 10px;
  color: #4a6080;
  letter-spacing: 0.05em;
  margin-top: 3px;
}
.match-md {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  color: #3a5070;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 1px;
}

/* ── Footer ── */
.footer {
  padding: 10px 16px;
  background: #060910;
  border-top: 1px solid rgba(212,175,55,0.1);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.legend {
  display: flex;
  align-items: center;
  gap: 12px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: #4a6080;
  letter-spacing: 0.05em;
}
.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.legend-dot.q { background: #d4af37; }
.legend-dot.u { background: #2a4060; }
.update-note {
  font-size: 10px;
  color: #2a4060;
  font-style: italic;
}
</style>

// ── Render ──
let activeGroup = 'D';

function getStandings(group) {
  return [...group.teams].map(t => ({
    ...t,
    GP: t.W + t.D + t.L,
    GD: t.GF - t.GA,
    PTS: t.W * 3 + t.D
  })).sort((a,b) => b.PTS - a.PTS || b.GD - a.GD || b.GF - a.GF);
}

function renderTabs() {
  const el = document.getElementById('group-tabs');
  el.innerHTML = Object.keys(groups).map(g =>
    `<button class="tab${g===activeGroup?' active':''}" onclick="setGroup('${g}')">Group ${g}</button>`
  ).join('');
}

function renderContent() {
  const group = groups[activeGroup];
  const standings = getStandings(group);
  const content = document.getElementById('content');

  // Find team flag by name
  const flagMap = {};
  group.teams.forEach(t => flagMap[t.name] = { flag: t.flag, img: t.img });

  // Standings
  let html = `<div class="group-label">Group ${activeGroup} Standings</div>`;
  html += `<table class="standings">
    <thead><tr>
      <th style="width:140px">Team</th>
      <th>GP</th><th>W</th><th>D</th><th>L</th>
      <th>GF</th><th>GA</th><th>GD</th>
      <th style="color:#d4af37">PTS</th>
    </tr></thead><tbody>`;

  standings.forEach((t, i) => {
    const qualified = i < 2 ? 'qualified' : '';
    const hostClass = t.host ? ' host' : '';
    const imgHtml = t.img
      ? `<img class="team-img" src="${t.img}" alt="${t.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    const flagHtml = `<div class="team-flag-placeholder" style="${t.img?'display:none':''}"}>${t.flag}</div>`;

    html += `<tr class="team-row ${qualified}">
      <td><div class="team-cell">${imgHtml}${flagHtml}<span class="team-name${hostClass}">${t.name}${t.host?' ★':''}</span></div></td>
      <td class="stat-cell">${t.GP}</td>
      <td class="stat-cell">${t.W}</td>
      <td class="stat-cell">${t.D}</td>
      <td class="stat-cell">${t.L}</td>
      <td class="stat-cell">${t.GF}</td>
      <td class="stat-cell">${t.GA}</td>
      <td class="stat-cell" style="color:${t.GD>0?'#4a9e6a':t.GD<0?'#b04040':'#6a8aaa'}">${t.GD>0?'+':''}${t.GD}</td>
      <td class="pts-cell">${t.PTS}</td>
    </tr>`;
  });
  html += `</tbody></table>`;

  // Matches
  html += `<div class="matches-label">Matches</div>`;
  group.matches.forEach(m => {
    const played = m.homeScore !== null;
    const hf = flagMap[m.home] || { flag:'', img:'' };
    const af = flagMap[m.away] || { flag:'', img:'' };
    const scoreHtml = played
      ? `<div class="match-score">${m.homeScore} – ${m.awayScore}</div>`
      : `<div class="match-vs">VS</div>`;
    html += `<div class="match-card ${played?'played':'upcoming'}">
      <div class="match-team">
        <span class="match-team-flag">${hf.flag}</span>
        <span>${m.home}</span>
      </div>
      <div class="match-center">
        ${scoreHtml}
        <div class="match-date">${m.date} · ${m.time}</div>
        <div class="match-md">${m.md}</div>
      </div>
      <div class="match-team away">
        <span>${m.away}</span>
        <span class="match-team-flag">${af.flag}</span>
      </div>
    </div>`;
  });

  content.innerHTML = html;
}

function setGroup(g) {
  activeGroup = g;
  renderTabs();
  renderContent();
}

renderTabs();
renderContent();
</script>
